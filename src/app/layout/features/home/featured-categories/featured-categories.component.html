<div class="flex items-center gap-3 my-8">
  <div class="h-8 w-1.5 bg-linear-to-b from-emerald-500 to-emerald-700 rounded-full"></div>
  <h2 class="text-3xl font-bold text-gray-800">
    Shop By <span class="text-emerald-600">Category</span>
  </h2>
</div>

<div class="mb-3 gap-3 grid grid-cols-2 lg:grid-cols-6">
  @for (item of catList(); track $index) {
    <div class="rounded-lg shadow-lg p-4 flex flex-col justify-center items-center py-8">
      <img class="size-16 rounded-full" [src]="item.image" alt="" />
      <h2>{{item.name}}</h2>
    </div>
  }
</div>
