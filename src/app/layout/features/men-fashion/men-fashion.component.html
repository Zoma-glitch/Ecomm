<section class="bg-linear-to-r from-green-600 to-green-400 text-white p-10">
  <div class="w-full mx-auto">

    <!-- Breadcrumb -->
    <div class="text-sm mb-5 opacity-90">
      <a routerLink="/home"  >Home</a>
      <span class="mx-2">/</span>
      <a routerLink="/shop" class=" couror-pointer font-semibold">All Products</a>
      <span class="mx-2">/</span>
      <span  class="font-semibold">Men's Fashion</span>
    </div>

    <!-- Header Content -->
    <div class="flex items-center gap-5">

      <!-- Icon -->
      <div class="w-16 h-16 rounded-xl bg-white/20 flex items-center justify-center text-2xl">
        <i class="fas fa-box"></i>
      </div>

      <!-- Text -->
      <div>
        <h1 class="text-4xl font-bold">All Products</h1>
        <p class="mt-1 opacity-90">
          Explore our complete product collection
        </p>
      </div>

    </div>

  </div>
</section>











<div class="flex items-center gap-3 my-8">
  <p>Showing 40 products
</p>

</div>

<div class="grid gap-3 grid-cols-2 lg:grid-cols-5">
  @for (item of productList(); track $index) {
    <div class="bg-white border border-gray-200 rounded-lg overflow-hidden">
      <div class="relative">
        <img
          class="w-full h-60 object-contain bg-white"
          alt="Woman Shawl"
          [src]="item.imageCover"
        />

        <div class="absolute top-3 right-3 flex flex-col space-y-2">
          <!-- Wishlist -->
          <button
            class="bg-white cursor-pointer h-8 w-8 rounded-full flex items-center justify-center transition shadow-sm text-gray-600 hover:text-red-500"
          >
            <i class="far fa-heart"></i>
          </button>

          <!-- Compare -->
          <button
            class="bg-white cursor-pointer h-8 w-8 rounded-full flex items-center justify-center text-gray-600 hover:text-green-600 transition shadow-sm"
          >
            <i class="fas fa-arrows-rotate"></i>
          </button>

          <!-- View -->
          <a
            class="bg-white cursor-pointer h-8 w-8 rounded-full flex items-center justify-center text-gray-600 hover:text-green-600 transition shadow-sm"
          >
            <i class="far fa-eye"></i>
          </a>
        </div>
      </div>

      <div class="p-4">
        <div class="text-xs text-gray-500 mb-1">{{ item.category.name }}</div>

        <h3 class="font-medium mb-1 cursor-pointer">
          <a class="line-clamp-2"> {{ item.title }} </a>
        </h3>

        <!-- Rating -->
        <div class="flex items-center mb-2">
          <div class="flex text-yellow-400 mr-2">
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="far fa-star"></i>
          </div>
          <span class="text-xs text-gray-500">{{ item.ratingsAverage }} ({{ item.quantity }})</span>
        </div>

        <div class="flex items-center justify-between">
          <span class="text-lg font-bold text-gray-800">{{ item.price }} EGP</span>

          <!-- Add -->
          <button
            (click)="addToCartAction(item._id)"
            class="h-10 w-10 rounded-full flex items-center justify-center transition bg-primary-600 text-white cursor-pointer bg-green-700"
          >

              <i class="fas fa-plus"></i>


          </button>
        </div>
      </div>
    </div>
  }
</div>
