


<div class="grid gap-3 grid-cols-2 lg:grid-cols-5">

  @for (item of allCat(); track $index) {

  <!-- Music Card -->
  <div
    class="group bg-white rounded-2xl overflow-hidden shadow-md border border-gray-100
           transition-all duration-300 hover:shadow-xl hover:-translate-y-1 cursor-pointer"
  >
    <div class="p-6 flex flex-col items-center">
      <img
        [src]="item.image"
        alt="Music"
        class="w-40 h-40 object-contain transition-transform duration-300 group-hover:scale-105"
      />

      <h2 class="mt-4 text-xl font-semibold text-gray-800 group-hover:text-green-500">
        {{ item.name }}
      </h2>
      <p class="text-sm text-green-500 mt-1 opacity-0 group-hover:opacity-100 transition">
        View Subcategories →
      </p>
    </div>
  </div>

  <!-- Men's Fashion Card -->
  }
</div>
